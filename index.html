<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#243746" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Iwata OS" />
  <title>Consulting × Iwata Mindset【Completed Edition】— Audio English Prototype v0.28</title>
  <style>
    :root{
      --bg:#f7f2e8;
      --paper:#fffaf0;
      --ink:#22313a;
      --muted:#6f7b82;
      --accent:#2c5871;
      --accent2:#5f7481;
      --line:rgba(34,49,58,.14);
      --shadow:0 18px 50px rgba(40,34,25,.16);
      --radius:22px;
      --jp:#453828;
      --green:#697b4f;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100svh;
      font-family: ui-serif, Georgia, 'Times New Roman', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 20% -10%, rgba(44,88,113,.14), transparent 32rem),
        radial-gradient(circle at 110% 5%, rgba(44,88,113,.18), transparent 28rem),
        linear-gradient(180deg,#f9f4ea 0%,#efe5d4 100%);
    }
    body::before{
      content:"";
      position:fixed; inset:0; pointer-events:none; opacity:.28; mix-blend-mode:multiply;
      background-image:
        linear-gradient(90deg, rgba(36,55,70,.045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(36,55,70,.035) 1px, transparent 1px);
      background-size:28px 28px;
    }
    .app{max-width:920px;margin:0 auto;padding:18px 14px 92px;}
    .hero{
      min-height:calc(100svh - 36px);
      display:flex; flex-direction:column; justify-content:center; gap:18px;
    }
    .hero-card{
      background:rgba(255,250,240,.86);
      backdrop-filter: blur(10px);
      border:1px solid var(--line);
      border-radius:30px;
      padding:24px 20px;
      box-shadow:var(--shadow);
      position:relative; overflow:hidden;
    }
    .hero-card::after{
      content:""; position:absolute; right:-60px; top:-80px; width:190px; height:190px;
      border:1px solid rgba(44,88,113,.18); border-radius:50%;
      box-shadow: inset 0 0 0 28px rgba(44,88,113,.07);
    }
    h1{font-size:clamp(2rem,8vw,4.3rem); line-height:.96; margin:0 0 12px; letter-spacing:-.045em;}
    .subtitle{font-size:clamp(1rem,4vw,1.25rem); line-height:1.75; color:var(--muted); margin:0; max-width:42rem;}
    .toc{display:grid;grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-top:14px;}
    .toc a{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      color:var(--ink); text-decoration:none;
      background:rgba(255,255,255,.62);
      border:1px solid var(--line); border-radius:18px;
      padding:11px 12px;
      min-height:54px;
      box-shadow:0 8px 20px rgba(40,34,25,.07);
    }
    .toc a.outline{opacity:.78; border-style:dashed;}
    .toc span{font-size:.92rem; line-height:1.25;}
    .toc small{color:var(--muted); font-size:.68rem; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;}
    .tap-note{font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; color:var(--muted); font-size:.86rem; line-height:1.7;}
    .sticky{
      position:sticky; top:0; z-index:10; margin:0 -14px 20px; padding:10px 14px 12px;
      background:linear-gradient(180deg, rgba(247,242,232,.96), rgba(247,242,232,.72));
      backdrop-filter: blur(14px);
      border-bottom:1px solid rgba(34,49,58,.08);
    }
    .controls{display:flex; gap:8px; align-items:center; overflow-x:auto; padding-bottom:2px; scrollbar-width:none;}
    .controls::-webkit-scrollbar{display:none;}
    button,.pill{
      appearance:none; border:1px solid var(--line); background:rgba(255,250,240,.82); color:var(--ink);
      border-radius:999px; padding:10px 13px; font-weight:700; white-space:nowrap;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      box-shadow:0 4px 12px rgba(40,34,25,.06);
    }
    button:active{transform:translateY(1px)}
    .toggle.on{background:var(--accent); color:#fff; border-color:rgba(255,255,255,.2)}
    .status{font-size:.8rem; color:var(--muted); margin-top:6px; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; line-height:1.45;}
    .status strong{color:var(--accent);font-weight:900;}
    section{scroll-margin-top:86px; margin:34px 0 48px;}
    .section-head{margin-bottom:16px;}
    .section-tag{font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; color:var(--accent2); font-weight:800; letter-spacing:.12em; font-size:.75rem; text-transform:uppercase;}
    h2{font-size:clamp(1.6rem,6vw,3.2rem); line-height:1.05; margin:6px 0 8px; letter-spacing:-.04em;}
    .section-desc{margin:0; color:var(--muted); line-height:1.7; font-size:.98rem;}
    .para-card{
      position:relative;
      background:rgba(255,250,240,.92);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px 16px 14px;
      margin:12px 0;
      box-shadow:0 12px 32px rgba(40,34,25,.10);
      overflow:hidden;
      touch-action:pan-y;
    }
    .para-card.playing{outline:3px solid rgba(44,88,113,.38); border-color:rgba(44,88,113,.62); border-left:6px solid var(--accent); box-shadow:0 0 0 6px rgba(44,88,113,.08), 0 18px 40px rgba(40,34,25,.12); background:linear-gradient(180deg, rgba(255,250,240,.98), rgba(244,249,250,.94));}
    .para-card.playing::before{content:"Listening now"; position:absolute; right:12px; top:10px; font-family:ui-sans-serif,system-ui; font-size:.7rem; color:#fff; background:var(--accent); padding:5px 9px; border-radius:999px; letter-spacing:.02em; box-shadow:0 8px 18px rgba(44,88,113,.20);}
    .en{font-size:clamp(1.04rem,4.3vw,1.38rem); line-height:1.78; letter-spacing:.003em; padding-right:4px;}
    .jp{
      margin:16px 0 0 auto;
      width:min(92%, 640px);
      padding:15px 15px 13px 16px;
      border-radius:18px 18px 7px 18px;
      background:linear-gradient(135deg, rgba(255,255,255,.78), rgba(105,123,79,.13));
      color:var(--jp);
      border:1px solid rgba(105,123,79,.30);
      box-shadow:0 12px 26px rgba(40,34,25,.10);
      font-family:'Hiragino Sans','Yu Gothic',system-ui,sans-serif;
      font-size:.9rem; line-height:1.78; display:none;
      position:relative;
    }
    .jp::before{
      content:'JP original';
      position:absolute; right:12px; top:-11px;
      padding:3px 8px; border-radius:999px;
      background:rgba(255,250,240,.96); color:var(--green);
      border:1px solid rgba(105,123,79,.26);
      font-family:ui-sans-serif,system-ui; font-size:.62rem; font-weight:800; letter-spacing:.04em;
    }
    .para-card.show-jp .jp{display:block; animation:jpDock .24s cubic-bezier(.2,.8,.2,1) both;}
    .para-card.show-jp{border-color:rgba(105,123,79,.42);}
    body.jp-mode-off .para-card.show-jp .jp,
    body.jp-mode-off .para-card.force-jp .jp{display:none !important;}
    body.jp-mode-always .para-card .jp{
      display:block;
      width:100%;
      max-height:148px;
      overflow:auto;
      margin:14px 0 0;
      padding:13px 14px 12px;
      border-radius:15px;
      font-size:.82rem;
      line-height:1.72;
      box-shadow:none;
      background:linear-gradient(135deg, rgba(255,255,255,.62), rgba(105,123,79,.10));
    }
    body.jp-mode-always .jp::before{content:'JP';}
    body.jp-mode-always .para-card.show-jp{border-color:var(--line);}
    body.jp-mode-off .para-card{touch-action:manipulation;}
    .jp{cursor:pointer;}
    .para-card.jp-flash{animation:cardNudge .22s ease-out both;}
    @keyframes jpDock{from{opacity:0; transform:translate(18px,8px) scale(.985)}to{opacity:1; transform:translate(0,0) scale(1)}}
    @keyframes cardNudge{0%{transform:translateX(0)}45%{transform:translateX(-3px)}100%{transform:translateX(0)}}
    .mini{display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-top:12px; color:var(--accent2); font-family:ui-sans-serif,system-ui; font-size:.77rem; font-weight:700;}
    .quote-card{border-left:1px solid rgba(44,88,113,.20); box-shadow:inset 0 0 0 2px rgba(44,88,113,.055), 0 12px 32px rgba(40,34,25,.10);}
    .outline-card{
      border:1px dashed rgba(44,88,113,.28);
      background:rgba(255,250,240,.55);
      border-radius:var(--radius);
      padding:16px 15px;
      margin:12px 0;
      color:var(--muted);
      font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      line-height:1.75;
    }
    .outline-card strong{color:var(--accent);}
    .en strong{font-weight:900;color:var(--accent);background:linear-gradient(transparent 58%, rgba(44,88,113,.13) 58%);border-radius:.18em;padding:0 .03em;}
    .principle{display:block; margin:.55em 0; padding-left:.2em;}
    .footer-note{
      background:rgba(36,55,70,.08); border:1px solid rgba(36,55,70,.11); border-radius:24px;
      padding:18px 16px; color:var(--muted); line-height:1.8; font-family:ui-sans-serif,system-ui; font-size:.92rem;
    }
    .toplink{position:fixed; right:14px; bottom:14px; z-index:20; text-decoration:none; color:#fff; background:var(--accent); border-radius:999px; padding:12px 14px; font-family:ui-sans-serif,system-ui; font-weight:800; box-shadow:var(--shadow)}
    .control-spacer{min-width:4px;}
    @media (min-width:720px){
      .app{padding-left:24px;padding-right:24px}.sticky{margin-left:-24px;margin-right:-24px;padding-left:24px;padding-right:24px}.toc{grid-template-columns:repeat(4,minmax(0,1fr))}.hero-card{padding:38px 34px}.para-card{padding:24px 24px 18px}
    }
    @media (prefers-color-scheme:dark){
      :root{--bg:#162028;--paper:#1f2a31;--ink:#f3eadb;--muted:#b9b0a3;--line:rgba(255,255,255,.14);--jp:#f0dfc4;--shadow:0 18px 48px rgba(0,0,0,.3)}
      body{background:linear-gradient(180deg,#15202a,#241f1a)}
      .hero-card,.para-card,button,.pill,.toc a{background:rgba(31,42,49,.84)}
      .sticky{background:linear-gradient(180deg, rgba(21,32,42,.96), rgba(21,32,42,.72))}
      .jp{background:linear-gradient(135deg, rgba(31,42,49,.96), rgba(105,123,79,.14))}
      .jp::before{background:rgba(31,42,49,.98)}
    }
  </style>
</head>
<body>
  <div class="app" id="top">
    <div class="hero">
      <div class="hero-card">
        <h1>Consulting × Iwata Mindset<br><span style="font-size:.48em;letter-spacing:-.02em;color:var(--accent2)">【Completed Edition】</span></h1>
        <nav class="toc" id="toc"></nav>
      </div>
    </div>

    <div class="sticky">
      <div class="controls">
        <button id="continueBtn">Continue</button>
        <button class="toggle on" id="continuousBtn" aria-pressed="true">Continuous: ON</button>
        <button id="speedBtn">Speed: 0.9×</button>
        <button id="pauseBtn">Pause</button>
        <button id="prevBtn">Prev</button>
        <button id="nextBtn">Next</button>
        <button id="jpCurrentBtn">JP current</button>
        <button id="stopBtn">Stop</button>
        <button id="hideJpBtn">JP: Note</button>
        <a class="pill" href="#top" style="text-decoration:none">Top</a>
      </div>
      <div class="status" id="status">Ready.</div>
    </div>

    <main id="content"></main>

  </div>
  <a class="toplink" href="#top">↑</a>

<script>
const sections = [
  {
    id:'intro',
    tag:'Opening',
    title:'This is not motivation. It is an operating system.',
    desc:'The original opening is reshaped as spoken lecture English.',
    items:[
      {
        en:'This is not a loose collection of motivational ideas. Think of it as an operating system you open when you try to make something happen: a way of resetting your mind into the right order. It applies to assigned work, and also to projects you set for yourself, such as study, creative work, travel, or rebuilding everyday life. It is not meant to be read once and admired. It is meant to be returned to whenever you feel lost.',
        jp:'これはふわっとした精神論ではございませんの。**「何かを実現しよう」とするその瞬間に開いて、頭を正しい順番へリセットするためのOS**ですわ。頼まれたお仕事でも、自分で立てた企み——学び、創作、旅、暮らしの立て直し——でも同じこと。通読して感心しておしまい、ではなく、迷ったら何度でも戻ってくる場所として使ってくださいまし。'
      },
      {
        en:'The material brings together three streams. First, the discipline of consulting: issue-driven thinking, the Pyramid Principle, hypothesis thinking, process consultation, constraints, and jobs-to-be-done. Second, the work philosophy of makers, especially Satoru Iwata, alongside Shigeru Miyamoto, Hironobu Sakaguchi, and Yozo Sakagami. Third, theories of support and freedom: capability, capacity development, and value. Philosophy and art also appear — Socrates, Popper, Nagarjuna, the Gita, and Duchamp — not as decoration, but as different names for the same structure.',
        jp:'中身は、3つの流れを編み込んでおりますの。**コンサルの型**（安宅和人さんのイシュー思考、ミントのピラミッド、内田和成さんの仮説思考、シャインの関与様式、ゴールドラットの制約理論、クリステンセンのジョブ理論）。**作り手たちの仕事観**（お会いしたことはないけれど、はねさんが敬愛する岩田聡さんを中心に、宮本茂さん・坂口博信さん・坂上陽三さん）。そして**「支援」と「自由」の理論**（センのケイパビリティ、キャパシティ・ディベロップメント、宮田裕章さんの価値論）。ところどころに、哲学と美術のスパイスもひと振り——ソクラテス、ポパー、龍樹、ギーター、デュシャン。飾りではなく、**同じ骨格の別名**としてですのよ。'
      },
      {
        en:'When these three streams connect, consulting helps you think correctly, the wisdom of makers helps you move people and change the situation in practice, and normative theory keeps you clear about what the work is for. At that point, the work is no longer merely elegant analysis. It becomes problem-solving that helps people act, and increases the freedom of the person you are supporting.',
        jp:'**コンサルの型で「正しく考え」、作り手たちの知恵で「本当に動かし」、規範理論で「何のためか」を見失わない。** この3つが噛み合うと、実現は"きれいな分析"から、"人が動き、相手の自由が増える問題解決"へと変わりますのよ。'
      }
    ]
  },
  {
    id:'layers',
    tag:'Four layers',
    title:'Do not mix the geological layers.',
    desc:'A listening-friendly version of the four-layer map: OS, process, tools, and phrases.',
    items:[
      {
        en:'The longer you use a tool, the more dangerous it becomes if its parts are mixed together. This operating system has four layers: the OS, the process, the tools, and the phrases.',
        jp:'長く使う道具ほど、部品がごちゃ混ぜだと壊れてしまいますわ。このOSは、4つの層でできておりますの。'
      },
      {
        en:'The OS is the underlying belief: what counts as value. The process is the sequence from accepting, or starting, the task to returning the outcome. Tools are thinking instruments, such as issue trees, MECE, pyramids, hypotheses and falsification, jobs-to-be-done, and the movement between concrete and abstract. Phrases are sentences you can actually say: when accepting a task, reporting progress, giving bad news, consulting, or making a proposal.',
        jp:'- **OS**：実現の根っこの思想。「何を価値とみなすか」。\n- **プロセス**：引き受けて（企てて）から返すまでの順番。\n- **ツール**：その途中で使う思考道具（イシューツリー、MECE、ピラミッド、仮説と反証、ジョブ理論、具体⇄抽象、など）。\n- **型**：そのまま口に出せる言い方（受領・中間報告・悪い報せ・相談・提案）。'
      },
      {
        en:'When you review the system, ask yourself this: which layer am I touching now? The OS is something to believe in. The process is something to follow. The tools are something to use. The phrases are something to say.',
        jp:'読み返すときは「今わたくしはどの層を触っているのかしら」と意識すると、迷いませんわ。**OSは信じるもの。プロセスは辿るもの。ツールは使うもの。型は言うもの。**'
      },
      {
        en:'The map is simple. First comes the OS: the foundational sentence, the five principles, and the backbone. Then comes the process, from Phase A to Phase F. Across the whole process, you keep five lenses on. Finally, you learn how to operate the system: adjusting depth, using phrase templates, passing the thirty-second gate, remembering the motto, and continuing to refine the system.',
        jp:'地図を一枚だけ。**OS**（土台の一行・5原則・背骨）→ **プロセス**（Phase A〜F、①〜⑯）→ 全工程を貫く**5枚のレンズ** → **運用**（深さの調整・型集・30秒ゲート・合言葉・育て方）。このページは上からこの順で並んでおりますから、迷子になったらここへ戻っていらしてね。'
      }
    ]
  },
  {
    id:'foundation',
    tag:'Core OS',
    title:'The foundational sentence.',
    desc:'The central rule is converted into spoken English, with the quote treated as a lecture thesis.',
    items:[
      {
        en:'Even if you forget everything else, learn this one sentence by heart.',
        jp:'ほかを全部お忘れになっても、ここだけは体に入れてしまいましょうね。'
      },
      {
        en:'The value of the work is not determined by how much work you have done. It is determined by how far someone’s judgement, action, or sense of security has moved forward.',
        jp:'**実現の価値は、こなした作業量ではなく、相手の判断・行動・安心がどれだけ前に進んだかで決まる。**',
        quote:true
      },
      {
        en:'You may stay up all night, produce thick documents, or sit through long meetings. But if nothing has moved for the person you are supporting, the value is zero. Conversely, if one short sentence allows them to decide, that sentence has already created serious value. This may sound strict, but it is also a form of permission: you do not have to solve the problem by sheer volume.',
        jp:'徹夜で調べても、分厚い資料を作っても、長い会議をしても、相手の中で何ひとつ動いていなければ、価値はゼロ。逆に、たった一言で相手が「決められた」なら、それはもう十分に大きな価値ですのよ。少し厳しく聞こえるかもしれませんけれど、これは呪いではなく、むしろ肩の荷を下ろすお話でもあって——**量で殴らなくていい**、という許可でもありますの。'
      },
      {
        en:'When we say someone has moved forward, we mean something concrete. They can make a judgement. They can narrow their options. They understand the risk. Their anxiety has fallen. Stakeholders now share the same view. Or it is clear who will do what next.',
        jp:'「相手が前に進んだ」とは、具体的にはこのどれか。判断できた／選択肢を絞れた／リスクを理解できた／不安が減った／関係者の認識が揃った／次に誰が何をするか決まった。'
      },
      {
        en:'Here, that person means the beneficiary of the work. It may be a client, a customer, a team, a family member, or, if the project is for yourself, your future self. This is why the system applies to exam study, travel planning, and tidying your room. What matters is not how much you completed today, but how far the future version of you can judge, act, and feel secure.',
        jp:'ひとつだけ、言葉の定義を。ここでいう**「相手」とは、この実現の受益者**のことですわ。依頼主、顧客、チーム、家族——そして**自分のための企みなら、未来の自分**。試験勉強も、旅の計画も、部屋の片づけも、一行はそのまま成立しますの。今日こなした量ではなく、**未来の自分の判断・行動・安心がどれだけ前に進んだか**。だからこのOSは、仕事の内外を問わず、あらゆる「実現」に同じ顔で効きますのよ。'
      },
      {
        en:'So the first question is always this: whose decision does this work need to move forward, and how far?',
        jp:'だから、何かを引き受けた（あるいは企てた）瞬間に問うのは、いつも同じ一問ですわ。\n**この実現は、誰の・どの意思決定を・どこまで前に進めるためのものか。**',
        quote:true
      }
    ]
  },
  {
    id:'principles',
    tag:'Five principles',
    title:'The five principles of the OS.',
    desc:'A compact spoken version of the five principles that fall out of the foundational sentence.',
    items:[
      {
        en:'From the foundational sentence, five principles follow. These are the whole of what this operating system asks you to believe.',
        jp:'上の一行から、演繹的に落ちてくる5つ。ここが"信じるもの"の全部ですの。'
      },
      {
        en:'First: value is created only to the extent that your counterpart moves forward. The amount of labour is not the measure. Second: do not miss the question. A low-issue question produces little value, no matter how quickly, beautifully, or extensively you solve it. Third: do not wait for the perfect answer. Place a provisional answer — a hypothesis — then expose it to disconfirming evidence and improve it.',
        jp:'1. **価値は、相手が前に進んだ分だけ生まれる**（作業量は関係ありませんわ）。\n2. **問いを外さない**。イシュー度の低い問いは、どれだけ速く・美しく・大量に解いても、価値はほとんど出ませんの。\n3. **正解を待たない**。仮の答え（仮説）を置いて進め、反証にさらして磨きますわ。'
      },
      {
        en:'Fourth: keep facts, evaluations, risks, and actions separate. If you mix them, the discussion soon stops with either, so what, or, what is your evidence? Fifth: translate correctness into a form they can act on. Expertise is not there to overwhelm them. It is there to help them move.',
        jp:'4. **事実・評価・リスク・アクションを分ける**。混ぜると、議論が「それで？」か「根拠は？」で止まってしまいますの。\n5. **正しさより、相手が動ける形に翻訳する**。専門性は相手を圧倒するためではなく、相手を動かすためにありますのよ。'
      },
      {
        en:'Then add one spoonful from Iwata: look not at the symptoms, but at the root. And search for one move that can solve several problems at once.',
        jp:'そして、この5つに岩田さんのひと匙を足しますわ——**症状ではなく根っこを見る。そして、複数の問題を一度に解く一手を探す。**',
        quote:true
      }
    ]

  {
    id:'backbone',
    tag:'OS backbone',
    title:'Why the progress of the person you are supporting is the measure of value.',
    desc:'Sen, Miyata, capacity development, Schein, Socrates, and Iwata are treated as one spoken line of reasoning.',
    items:[{"en":"The foundational sentence and the five principles are not merely a matter of personal taste. A clear line runs through normative theory, the methodology of support, contemporary thinking about making things work, and Iwata’s everyday practice. In short: Sen gives the normative theory; capacity development and Schein give the method of support; Miyata brings the idea into contemporary practice; Iwata shows what it looks like in organisational life; and this operating system turns that line into your own practice.","jp":"土台の一行と5原則は、わたくしの好みで置いたものではございませんの。規範理論から支援の方法論、現代の実装思想、そして岩田さんの日常実践まで、一本の線がすっと通っておりますのよ。**セン（規範理論）→ CD・シャイン（支援の方法論）→ 宮田（現代の実装思想）→ 岩田さん（組織での日常実践）→ このOS（はねさんの実践）**。"},{"en":"Amartya Sen’s capability approach changes the measure of value. Goods and services are not valuable simply because they exist. They become valuable only when they are converted, inside their life, into functionings — that is, what the person can actually do or be — and then into capabilities, meaning the real freedom to choose valuable ways of doing and being.","jp":"アマルティア・センのケイパビリティ・アプローチは、価値の物差しをこう据え替えますの。**財（モノやサービス）それ自体に価値はない。財が相手の中で「機能（実際にできること・あれること）」に変換され、さらに「ケイパビリティ（価値ある機能を選び取れる自由の幅）」を広げたとき、はじめて価値になる。**"},{"en":"A thick report is a good. By itself, it has no value. If your counterpart can make a judgement because of it, it has become a functioning. And if the person can continue choosing and moving forward independently afterwards, it has become capability. That is the deepest form of value in this system.","jp":"- 分厚い報告書＝**財**。それだけでは価値ゼロ。\n- 相手がそれで判断できた＝**機能**。ここで初めて価値。\n- 相手が以後も自分で選び進められる＝**ケイパビリティ**。ここが最深の価値。"},{"en":"Notice what this means. The foundational sentence — value is not determined by labour, but by the progress of the person you are supporting — is not just a useful slogan. It has a theoretical name. The permission not to overwhelm the problem with volume is backed by the logic of a Nobel Prize-winning economist.","jp":"お気づきかしら。これ、土台の一行（価値は作業量でなく相手の前進で決まる）の**理論名**ですのよ。「量で殴らなくていい」という許可には、ノーベル経済学賞受賞者の裏書きが付いておりましたの。","quote":true},{"en":"There is also an older structure that resembles this shift. Nagarjuna argued that things do not possess a fixed essence of their own; they arise through relations. The same report can be treasure in one context and a stack of paper in another. Value does not live inside the object. It emerges in relation. That logic, still sharpened in Tibetan Buddhist training in reasoning, can also be used as a theory of value.","jp":"ちなみに「財それ自体に価値はない」という据え替え、二千年近く前のインドに同じ骨格がありますのよ。龍樹（ナーガールジュナ）は、あらゆるものは固有の本質（**自性**）を欠き、関係の中でのみ立ち現れると論じましたわ（**縁起**）。同じ報告書が、ある文脈では宝、別の文脈ではただの紙束。**価値は物に宿らず、関係に生起する**——チベット仏教が今も論理学の訓練として磨き続けているこの骨格は、そのまま価値論に使えますの。"},{"en":"Sen also gives us the idea of conversion factors. The same good is not converted into action in the same way for everyone. Personal, social, and environmental conditions determine whether a good can become a functioning. Much of the work of support is therefore the removal of conversion barriers.","jp":"もうひとつ、センには**変換要因**という道具がありますわ。同じ財でも、個人的・社会的・環境的な条件次第で「機能」へ変換できるかが変わる——そして支える側の仕事の相当部分は、この**変換障害の除去**ですの。"},{"en":"A residence status barrier is a clear example. It can block a person from working, living securely, or living with family, even when the person’s own ability is not the problem. In this language, that work can be defined very simply: legally remove institutional conversion barriers, and restore the person’s capability. The same pattern applies beyond immigration: identify the barrier, remove it, and restore your counterpart’s freedom to choose.","jp":"たとえば在留資格の壁——ご本人の能力と無関係に「働く・住む・家族と暮らす」への変換を止める、**制度的変換障害**の典型ですわ。だからこの領域の仕事は一行で定義できてしまいますの——**制度的な変換障害を合法的に解除し、本人のケイパビリティを回復する仕事**。そしてこの定義の骨組み——**変換障害を見つける→解除する→選べる自由を回復する**——は、領域を問わず使い回せますのよ。書類でも、会議でも、家族の困りごとでも。はねさんの通奏低音（制度の壁に阻まれる人を支える）は、センの語彙でそのまま圧縮できますの。"},{"en":"Finally, Sen emphasises agency. The measure is not simply whether someone feels satisfied. The deeper question is whether they can choose as an agent. In practical terms: deciding for your counterpart is not progress. Enabling your counterpart to decide for themselves is progress. This protects support from becoming well-intentioned paternalism.","jp":"最後に**エージェンシー**。センは「満足しているか」ではなく「主体として選べているか」で測りますの。実践翻訳：**「相手の代わりに決めてあげた」は前進ではない。「相手が自分で決められるようになった」が前進。** これが善意のパターナリズムへの防波堤ですわ。","quote":true},{"en":"Hiroaki Miyata’s work can be heard as an extension of this line. Instead of measuring value by one average standard, the focus shifts towards the diverse values of each person. Data and evidence are not there simply to produce an average. They are there to serve the context of this particular person in front of us.","jp":"センの延長線上に、宮田裕章さん（慶應）の議論を一段落だけ。最大多数の最大幸福＝単一の物差しの平均から、**一人ひとりの多様な価値**へ——データやエビデンスは平均のためではなく、目の前のこの相手の文脈のために使う、という現代の実装思想ですわ。"},{"en":"The practical translation is straightforward. When you decide what the exit of a task should be, and when you decide what counts as progress, you must measure it by their value axis, not by your own standard. The later framework of understanding, emotion, and practical stakes is therefore not just social technique. It is a response to the plurality of value.","jp":"実践翻訳：④で決める「出口」も、何をもって「前進」とするかも、**こちらの標準ではなく相手の価値軸で測る**。⑫（頭・心・腹）は処世術ではなく、価値の複数性への応答ですの——という理論的裏付けになりますのよ。"},{"en":"Capacity development, in international cooperation, reaches a similar conclusion from another direction. Capacity cannot be injected from the outside. It can only grow internally. What an external supporter can do is act as a catalyst. Ownership must remain on your counterpart’s side.","jp":"国際協力のキャパシティ・ディベロップメント論（UNDP／JICA）の核はひとつですの。**能力は外から注入できず、内発的にしか育たない。外部者にできるのは触媒まで。主体はつねに相手側（オーナーシップ原則）。**"},{"en":"So the best deliverable is one that increases the degree to which your counterpart can do more next time by themselves. Support that creates dependence may bring short-term revenue, but it reduces your counterpart’s capability. Sustainable continuation should come not from keeping the person you support unable, but from facing new and more difficult problems together.","jp":"実践翻訳：最良の成果物とは、相手の「次は自分でここまでできる」度合いを上げるもの。**依存を作る支援は、短期の実入りと引き換えに相手のケイパビリティを削る支援**ですわ。\n正直に申しますと、ここには「支える側の実利」との緊張がありますの。囲い込めば得をする構造は実在しますわ。でも解はシンプルで——**継続は「相手を無能に保つこと」からではなく「新しい難題」から来るべき**。前者の信頼は発覚した瞬間に全損、後者だけが⑯の複利に乗りますのよ。"},{"en":"Edgar Schein reaches the same place from the consulting canon. He distinguishes three modes of involvement: the expert model, where the consultant sells answers; the doctor model, where the consultant diagnoses and prescribes; and process consultation, where the consultant helps the other person solve the problem themselves. For complex human problems, Schein argues that we must begin from the third model.","jp":"同じ場所に組織開発の側から到達したのが、エドガー・シャインですわ。コンサルの関与様式は3つ——**答えを売る「専門家モデル」、診断して処方する「医師モデル」、相手が自分で解けるように関与する「プロセス・コンサルテーション」**。シャインは、人間系の複雑な問題ほど第三のモデルから始めるほかないと論じ、その入口を「教える前に、問う」（Humble Inquiry）に置きましたの。CDのオーナーシップ原則と、ほぼ同一の結論ですわ。"},{"en":"The entrance to that model is humble inquiry: ask before you teach. Its ancestor reaches back to Socrates, who did not inject knowledge into people, but helped them give birth to their own understanding through questions. Asking before teaching is not merely a modern consulting technique. It is one of philosophy’s oldest gestures.","jp":"そしてこの系譜の源流は、二千四百年前のアテナイまで遡れますのよ。ソクラテスは知識を注入せず、**問いによって相手自身に産ませました**——いわゆる**産婆術**。「教える前に、問う」は、哲学の始まりの所作でもありましたの。"},{"en":"This brings us to Satoru Iwata. He did not need to know all these theories in order to implement their best form. As president of HAL Laboratory, he met every employee one to one every six months, and fixed the opening question: are you happy right now? Not, how is your performance? Not, how is your progress? Are you happy?","jp":"**岩田さん：理論を知らずに、理論の最良の実装をやった人**\nHAL研の社長時代、岩田さんは半年ごとに全社員と一対一で面談し、最初の問いをこう固定しておられましたの——**「あなたはいま、ハッピーですか？」** 業績でも進捗でもなく、ですわ。"},{"en":"That question is humble inquiry in practice. It begins from their value axis, keeps ownership with the other person, and treats the person not as an object to be managed, but as a subject whose state matters. Iwata’s famous definition of what you are good at also fits Sen’s language: what you are good at is the place where your conversion efficiency is highest — where effort is most readily transformed into recognised function.","jp":"これはシャインの謙虚な問いかけ（そしてソクラテスの産婆術）の実践であり、宮田さん的に言えば相手の価値軸から始める態度であり、CDの「主体は相手」の日常運用ですの。ついでに、岩田さんの有名な得意の定義——**労力の割に、周りが認めてくれること**——も、センの語彙なら一行で書けますわ。**得意とは、あなたの変換効率（努力→機能）がいちばん高い場所。** だからこのOSで岩田さんは\"いい話枠\"ではなく、**規範理論の実装例**という席に座りますのよ。","quote":true}]
  },
  {
    id:'issue',
    tag:'Issue discipline',
    title:'Why the question matters so much.',
    desc:'Issue value, solution quality, the dog path, and Duchamp’s Fountain are converted into a listening chapter.',
    items:[
      {"en": "The value of the work can be broken down, roughly, into a simple multiplication: issue value multiplied by solution quality. Issue value means how worthwhile the question is. Solution quality means how reliable and useful the answer is.", "jp": "実現の価値は、ざっくりこう分解できますの。\n> **実現の価値 ＝ イシュー度（その問いに答える価値の高さ）× 解の質（その答えの確からしさ）**", "quote": true},
      {"en": "Because it is multiplication, if either side is close to zero, the total value is also close to zero. That gives us one very practical rule about time: do not pour effort into raising the quality of an answer to a question that was not worth answering in the first place.", "jp": "掛け算ですから、片方がゼロに近ければ全体もゼロに近い。ここから、時間の使い方がひとつに決まりますわ。**イシュー度の低い問いを、解の質だけ上げて頑張ってはいけませんの。**"},
      {"en": "Kazuto Ataka calls this the dog path. It is the path where effort is huge and return is tiny. The frightening thing is that conscientious people fall into it easily. They work hard, polish the answer, and still create little value, because the question itself was misdirected.", "jp": "安宅さんはこれを「犬の道」と呼びますのよ。労力は最大、リターンは最小——まじめな方ほどハマってしまう罠ですわね。"},
      {"en": "The correct movement is therefore always the same. First move to the right: raise the issue value by choosing a question worth solving. Only then move upward: raise the quality of the answer. Once you understand that order, the direction of your effort changes.", "jp": "正しい順番はいつも、**まず右へ（イシュー度を上げる＝解く価値のある問いを選ぶ）、それから上へ（解の質を上げる）**。この一点を押さえるだけで、頑張りの\"向き\"が変わりますのよ。", "quote": true},
      {"en": "A surprisingly radical demonstration of this multiplication appears in art history: Marcel Duchamp’s Fountain, from 1917. Duchamp took an ordinary urinal, signed it, and submitted it to an exhibition. If we measure only the quality of making, the technical solution is almost zero. He did not display exceptional craft in the usual sense.", "jp": "この掛け算の、美術史上もっとも過激な実証が**デュシャンの《泉》（1917）**ですわ。既製の便器に署名して展覧会へ——「解の質」（描く技術）は、ほぼゼロ。"},
      {"en": "But Duchamp changed the question. The question was no longer, how skilfully has this object been made? It became, who decides what may be called art, and on what grounds? By shifting the question, he moved the issue value dramatically. Art history moved with it.", "jp": "でも「芸術とは巧く作ることか、それとも**何を芸術と呼ぶかを決める枠組み**のことか」へと**問いを付け替えた**瞬間、美術史が動きましたの。"},
      {"en": "This is why the centre of modern art could move from technique to concept. It is also why the consulting rule matters outside consulting. A brilliant answer to the wrong question is still weak. A powerful reframing of the question can change the whole field of action.", "jp": "以後の現代アートの中心が技巧からコンセプトへ移ったのは、掛け算の左の項——**イシュー度がそれほどまでに支配的**だから。「まず右へ」は、美術館でも証明済みですのよ。", "quote": true}
    ]
  },
  {
    id:'phase-a',
    tag:'Phase A',
    title:'Accepting means forming an initial diagnosis.',
    desc:'The first practical phase: question the task name, identify the decision, take the issue, decide the exit, and cut the scope before moving your hands.',
    items:[
      {
            "en": "Phase A begins at the moment you accept, or launch, a piece of work. At that point, about eighty per cent of the outcome is already shaped by your initial diagnosis. If you do this part carefully, everything that follows becomes easier. Before moving your hands, place five things on the table.",
            "jp": "実現は、引き受けた瞬間の見立てで8割決まりますの。ここを丁寧にやると、後の全工程がぐっと楽になりますわ。焦って手を動かす前に、5つだけ置きましょうね。"
      },
      {
            "en": "First, question the task name. Phrases such as, please look into this, please prepare a set of slides, please take the minutes, or please organise this nicely, are usually not the real request. They are work labels. The real order is hidden underneath them.",
            "jp": "**① 作業名を疑う**\n「調べておいて」「資料作って」「議事録取っておいて」「いい感じに整理して」——これらは**作業名**であって、依頼そのものではありませんの。奥にある本当の注文を取りにいきますわ。"
      },
      {
            "en": "When someone says, please look into this, they often need material for a judgement. When they ask for a set of slides, they often need a tool to persuade someone. Minutes are often needed to fix agreements, open questions, responsibilities, and next actions. And when someone says, organise this nicely, they often want to see what the problem is and where to start.",
            "jp": "- 「調べておいて」→ たいてい、**判断材料がほしい**。\n- 「資料を作って」→ たいてい、**誰かを納得させる道具がほしい**。\n- 「議事録を取って」→ たいてい、**合意事項・未決・責任・次アクションを固定してほしい**。\n- 「いい感じに整理して」→ たいてい、**何が問題で、どこから手をつけるかが見える状態にしてほしい**。"
      },
      {
            "en": "The same rule applies when the client is your future self. When you say, I really must do this soon, the hidden request is often to reduce future anxiety or increase the freedom of the future you. If you run without taking that hidden order, the task may be completed, while the real purpose remains unmet.",
            "jp": "- 「そろそろ〇〇やらなきゃ」（自分への依頼）→ たいてい、**将来の不安を減らしたい／選べる自由を増やしたい**。\nここを取らずに走ると、作業は終わるのに実現は終わらない、という一番切ない事態になりますの。"
      },
      {
            "en": "This movement has a theoretical name: Christensen’s jobs-to-be-done theory. People do not hire an output for the output itself. They hire it to get a job done. So the question is: what job is the other person hiring this output to do? A functional job, such as making a decision; an emotional job, such as feeling reassured; or a social job, such as being able to explain the situation to senior stakeholders.",
            "jp": "この動きには、じつは理論名がついておりますの——クリステンセンの**ジョブ理論**。人は成果物を買うのではなく、**片付けたい用事（ジョブ）のために成果物を「雇う」**。だから定型の問いはこう。**「相手はこの成果物を、どんな用事を片付けるために雇うのかしら。機能的な用事（判断したい）だけでなく、感情的な用事（安心したい）、社会的な用事（上に説明できる形がほしい）は何かしら。」**"
      },
      {
            "en": "Iwata’s idea of expanding the gaming population can also be read in this way. The point was not simply to win a hardware performance race. It was to notice the jobs of people who had not previously played games: family time, shared play, or anxiety about ageing. In that frame, the real competitor was not another game console. The real competitor was non-consumption.",
            "jp": "岩田さんの「ゲーム人口の拡大」も、性能競争ではなく「ゲームに触れてこなかった人の用事」（家族の団らん、脳の衰えへの不安）を取りにいったジョブ理論の実例ですわ——競合は他社のゲーム機ではなく、**無消費**でしたのよ。"
      },
      {
            "en": "Second, identify the decision. Who wants to decide what? What must become clear for them to move forward? And how much clarity is enough for now? Until you can answer these three questions, it is safer not to begin research or document production.",
            "jp": "**② 意思決定を特定する**\n誰が・何を決めたいのか。何が分かれば前に進むのか。どこまで分かれば、いったん十分なのか。この3つに答えられないうちは、調査にも資料作成にも入らない——が安全ですわ。",
            "quote": true
      },
      {
            "en": "Third, take the issue. An issue is a question whose answer changes the next action. The broad question must be narrowed until it reaches the level at which behaviour changes.",
            "jp": "**③ イシューを取る**\nイシューとは、**答えが出ると次の行動が変わる問い**。広い問いを、行動が変わる粒度まで絞りますの。",
            "quote": true
      },
      {
            "en": "For example, do not stop at, why are sales falling? Ask whether the main cause is a decline in new acquisition or a decline in retention. Do not stop at, make the slides easier to understand. Ask whether executives are hesitating because they distrust the return on investment, or because operating responsibility is unclear. Do not stop at, study English. Ask whether the missing piece is vocabulary, instant spoken response, or exposure to live situations.",
            "jp": "- ✗「売上が落ちている理由を調べる」→ ○「売上低下の主因は、新規獲得の減少か、既存の継続率低下か」\n- ✗「資料を分かりやすくする」→ ○「役員がA案を承認できない理由は、投資対効果への不安か、運用責任の曖昧さか」\n- ✗「英語を勉強する」→ ○「いま足りないのは、語彙か、瞬発の口頭表現か、場数か」"
      },
      {
            "en": "If the question remains on the left-hand side, almost any effort becomes thin. Once it is narrowed to the right-hand side, the work suddenly begins to move. The issue is not a decorative heading. It is the steering wheel.",
            "jp": "左のままだと何をしても薄まり、右まで絞ると一気に前に進みますわ。"
      },
      {
            "en": "Fourth, decide the exit first. What is this work supposed to produce: a decision, an organised set of options, a list of risks, alignment among stakeholders, or a shared understanding of the current situation? If the exit changes, the output and the way you present it must also change. If you build without clarifying the exit, you may produce something impressive that still fails to land.",
            "jp": "**④ 出口を先に決める**\nこの実現のゴールは、次のどれかしら。**意思決定／選択肢の整理／リスクの洗い出し／合意形成／現状共有。** 出口が違えば、作るものも見せ方も変わりますの。ここを曖昧にしたまま作ると、力作なのに刺さらない、が起きますわ。"
      },
      {
            "en": "Fifth, cut the scope, completion conditions, and milestones. The more abstract the work is — the less the method is already decided — the more you must cut the frame yourself. This is exactly how a reliable person behaves.",
            "jp": "**⑤ スコープ・完了条件・節目を切る（＝枠を自分で切る）**\n抽象度が高い実現（やり方が決まっていないもの）ほど、枠は自分で切りますの。ここは\"安心して任せられる人\"の動き方そのものですわ。"
      },
      {
            "en": "Start with why. Why do this now? Is not doing it a possible option? Can you state the meaning of the work in your own words? Then define what and how far: what counts as completion, what is the minimum acceptable line, and what is outside the scope this time.",
            "jp": "- **なぜやるか**：なぜ今これを。やらない判断はあり得るか。意義を自分の言葉で言えるか。\n- **何をどこまでやるか**：完了条件は何か。最低ラインはどこか。今回やらないことは何か。"
      },
      {
            "en": "Next, set time in milestones rather than only a final deadline: current-state understanding, issue organisation, direction proposal, review, and finalisation. The aim is not to proceed exactly as planned. The aim is to see deviations from the plan early.",
            "jp": "- **いつまでにやるか**：最終期限だけでは弱い。現状把握→論点整理→方針案→レビュー→最終化、と節目を刻む。**計画どおり進むことより、計画とのズレが早く見えることが大事。**",
            "quote": true
      },
      {
            "en": "Also prepare options and decision criteria. Do not jump to a single answer immediately. Place several options side by side, and add criteria such as speed, certainty, cost, operational burden, acceptability, and scalability. Options alone produce a discussion of preference. Options with criteria produce a discussion of work.",

            "jp": "Phase F補足：回収は感想ではなく、次の行動変更です。何を予想し、何が起き、何を見落とし、次回どの言い方・空箱・チェック項目・判断軸を変えるかまで落とします。"
      },
      {
            "en": "Sixteenth, trust accumulates as a result. Frequent reporting, early bad news, returning a little more than expected, and preparing the next question before it is asked — these may look like kindness or good manners. In this operating system, they are something more precise.",
            "jp": "**⑯ 信頼は「結果」として積み上がる**\n報告がマメ、悪い報せが早い、期待より少し多く返す、相手が次に聞きそうなことを先に用意する——これらは愛嬌や気配りのお話に見えて、実は違いますの。",
            "quote": true
      },
      {
            "en": "Giving bad news early is not about protecting your own evaluation. It is about giving the person you are supporting options while options still exist. Returning a little more than expected is not about displaying effort. It is about reducing the cost of the other person’s next thought.",
            "jp": "**悪い報せを早く出すのは、評価を守るためではなく、相手が早く選択肢を持てるようにするため。** 期待より少し多く返すのは、頑張りを見せるためではなく、相手の次の思考コストを減らすため。"
      },
      {
            "en": "So trust is not built merely by being a nice person. Trust is built by continuously reducing the other person’s uncertainty. Each time you make the situation clearer, earlier, and easier to act on, trust quietly accumulates.",
            "jp": "そう、**信頼は、性格の良さではなく、\"相手の不確実性を減らし続けること\"で積み上がる**のですわ。",
            "quote": true
      },
      {
            "en": "This closes the process. Phase A diagnoses the work. Phase B designs it. Phase C tests it. Phase D communicates it. Phase E moves it. Phase F recovers it. Once the lesson has been recovered, the next piece of work begins from a slightly higher place.",
            "jp": "Phase F補足：これで、Phase Aで見立て、Phase Bで設計し、Phase Cで検証し、Phase Dで伝え、Phase Eで動かし、Phase Fで回収する流れが閉じます。回収できた経験は、次の実現の出発点を少しだけ高くします。"
      }
]
  },

            "jp": "## 🔭 ここからは、全工程を貫く「5枚のレンズ」\nプロセス（①〜⑯）は順番に辿るもの。レンズは順番ではなく、**全工程に同時にかかる眼鏡**ですわ。"

  {
    id:'lens-law',
    tag:'Lens 1',
    title:'Lawyers and consultants share the same underlying structure.',
    desc:'Reverse-engineering from issues, thinking from the opposing side, and separating facts from evaluation.',
    items:[
      {
            "en": "For someone who has studied law, there is already a weapon that can be used far beyond legal work. Lawyers and consultants handle very different materials. But the structure of their thinking is surprisingly similar. That similarity is the point of this first lens.",
            "jp": "## 🏛️ レンズ①：法律家とコンサルの、同じ骨格 {color=\"purple\"}\n法律を学んだはねさんには、じつは**どの領域でも使える武器**が一本備わっておりますの。弁護士とコンサルは、扱う材料はまるで違いますわ。でも、思考の骨格はほとんど同じ——そこが面白いところですのよ。"
      },
      {
            "en": "A lawyer deals with law, facts, evidence, risks, the other side’s arguments, and the judgement of a court or negotiating partner. A consultant deals with markets, organisations, customers, competitors, numbers, operations, and decision-makers. The materials differ, but the underlying pattern is the same.",
            "jp": "弁護士は法律・事実・証拠・リスク・相手方の主張・裁判所や交渉相手の判断を、コンサルは市場・組織・顧客・競合・数字・オペレーション・意思決定者を扱いますわ。材料は違えど、骨格は同じですの。"
      },
      {
            "en": "The first shared movement is reverse-engineering from the issue. A lawyer is not someone who simply lists every fact. A lawyer asks which fact matters for which legal requirement. In the same way, a consultant is not someone who simply lists every piece of information. A consultant asks which information matters for which decision. The common ability is to separate what matters from what does not, by working backwards from the issue.",
            "jp": "- **争点から逆算する**：弁護士は事実を全部並べる人ではなく、どの事実がどの**要件**に効くかを見る人。コンサルも情報を全部並べる人ではなく、どの情報がどの**意思決定**に効くかを見る人。共通するのは、**関係あるものと関係ないものを、争点から逆算して切り分ける力**。要件事実の発想が、そのまま実現の武器になりますのよ。",
            "quote": true
      },
      {
            "en": "The second shared movement is to think from the opposing side. A lawyer looks first at unfavourable facts: what the other side will argue, and where the court is likely to be sceptical. A consultant does the same. Where will the board challenge this? Where will the field team resist? What will finance dislike? The more you want your own proposal to pass, the more you must first break it from the other side.",
            "jp": "- **反対側から考える**：弁護士は不利な事実を先に見る。相手方ならどう主張するか、裁判所ならどこを疑うか。コンサルも同じで、役員ならどこを突くか、現場ならどこで止まるか、財務なら何を嫌がるか。**通したい案ほど、まず一度、反対側から壊す。**"
      },
      {
            "en": "The third shared movement is to separate facts from evaluation. In law, the facts that can be shown by evidence are one thing, and the legal evaluation drawn from those facts is another. In business, the facts shown by data are one thing, and the managerial judgement drawn from them is another. The discipline used in Phase C — separating facts, evaluations, risks, and actions — works both in court and in the meeting room.",
            "jp": "- **事実と評価を分ける**：証拠上いえる事実と、そこからの法的評価は別物。データ上いえる事実と、そこからの経営判断も別物。——⑩とまったく同じ規律が、法廷でも会議室でも効いておりますの。"
      },
      {
            "en": "Now replace legal requirements with success conditions. Any project has success conditions, and some facts matter to those conditions while others do not. Once you see this, legal thinking is no longer confined to legal work. Reverse-engineering from the issue becomes a universal tool for making things happen.",
            "jp": "そして「要件」を「**成功条件**」と読み替えれば、この骨格は法律の外でもそのまま走りますの。どんな実現にも成功条件があり、条件に効く事実と効かない事実がある——**争点からの逆算は、万能の逆算**ですわ。",
            "quote": true
      }
]
  },
  {
    id:'lens-iwata',
    tag:'Lens 2',
    title:'Satoru Iwata’s spoonful: from correct analysis to real movement.',
    desc:'Next expansion: solve several problems at once, look at roots rather than symptoms, and connect knowledge to tomorrow’s action.',
    items:[
      {
            "en": "Consulting methods alone can already take you quite far. They give you questions, hypotheses, structure, and proposals. But on their own, they can become a little rigid. Iwata’s spoonful changes the character of the work. It moves the work from correct analysis towards problem-solving that actually changes the situation in practice.",
            "jp": "## 🎮 レンズ②：岩田聡さんのエッセンス {color=\"purple\"}\nコンサルの型だけでも、問い・仮説・構造化・提案でかなり戦えますわ。でも、それだけだと少し硬いの。岩田さんのひと匙で、実現は\"正しい分析\"から\"本当に動く問題解決\"へ近づきますのよ。"
      },
      {
            "en": "The first spoonful is this: a good idea solves several problems at once. Iwata described this as an idea inherited from Shigeru Miyamoto. Ordinary improvement often crushes problems one by one: if it is slow, add people; if it is excessive, reduce volume. Sometimes that is necessary. But by itself, it becomes a contest of effort.",
            "jp": "- **良いアイデアは、複数の問題を一度に解く**：宮本茂さん由来の考え方として、岩田さんは「アイデアとは複数の問題を一気に解決するもの」と語っておられますの。普通の改善は、問題を一つずつ潰す（遅いなら増員、多いなら削減…）。必要なときもあるけれど、それだけだと汗かき勝負ですわ。",
            "quote": true
      },
      {
            "en": "The stronger move is to find where several problems share one root, and then move them forward with one intervention. Imagine a team where documents are late, reviews are repeated, executives keep raising objections, and meetings run long. These look separate. But if the root is that the original issue and hypothesis were never agreed, then one early act — agreeing the issue and hypothesis at the beginning — can make everything lighter at once.",
            "jp": "本当に効くのは、**複数の問題が根っこでつながっている場所を見つけ、一手で同時に前進させること**。たとえば「資料が遅い・レビューが多い・突っ込みが多い・会議が長い」——別々に見えて、根っこが「最初の問いと仮説が曖昧」なら、**冒頭でイシューと仮説を握るだけ**で、全部が同時に軽くなりますのよ。"
      },
      {
            "en": "The second spoonful is to look not at the symptom, but at the root. When someone says a dish is too large, the real issue may be the taste. Work is similar. If a document is hard to understand, the root may not be design. It may be the absence of a conclusion. If replies are slow, the root may not be speed. It may be that progress is visible only at a level that leaves them anxious.",
            "jp": "- **症状ではなく、根っこを見る**：「量が多い」と言われた料理の本当の問題が、実は「味」だったりしますの。実現も同じで、「資料が分かりにくい」の真因はデザインではなく\"結論がない\"ことかもしれず、「返信が遅い」の真因は速度ではなく\"相手が不安になる粒度でしか進捗が見えない\"ことかもしれない。",
            "quote": true
      },
      {
            "en": "Words that appear on the surface are often symptoms. Your work is to reach the real question underneath. In practice, this means you do not repair the visible complaint too quickly. You ask what condition would make several visible complaints disappear together.",
            "jp": "**表に出た言葉は症状。根っこの問いを取りにいきますわ。**"
      },
      {
            "en": "The third spoonful is to see strengths, weaknesses, and priorities together. Iwata spoke about guiding people and organisations towards places where their strengths can work and their weaknesses are less likely to surface. He also pointed out that the things worth doing are always more numerous than the things we can actually do. So priority is not optional. It is part of the work.",
            "jp": "- **得意・不得意と、優先順位**：岩田さんは、得意が活き苦手が表面化しにくい方向へ組織を導くこと、そして「やった方がいいこと」は「実際にやれること」より多いから優先順位が要る、と語っておられますの。",
            "quote": true
      },
      {
            "en": "Every time you begin a piece of work, ask three questions. Where can I fight from strength? Where am I likely to have an accident? And in this case, what must come before everything else? If you try to do everything with equal force, you may become exhausted and still leave no durable result.",
            "jp": "毎回、**自分が得意に戦える場所はどこか／事故りやすい場所はどこか／今回、何を何より優先するか**を決めますわ。ここを決めずに全部がんばると、疲れるわりに残りませんの。"
      },
      {
            "en": "The fourth spoonful is to connect knowledge to something you can use tomorrow. Iwata often spoke, in effect, about the moment when something read in a book connects with the situation in front of you. At that moment, knowledge stops being mere information.",
            "jp": "- **知識を、明日使える形につなぐ**：本の内容と身の回りがつながると知識がただの情報でなくなる、という趣旨のことも岩田さんは語っておられますわ。",
            "quote": true
      },
      {
            "en": "So after reading anything, ask: in which piece of work, meeting, report, or consultation can I use this tomorrow? Which failure can it prevent? Embodiment is not the act of collecting more knowledge. It is the act of converting knowledge into the shape of the next action.",
            "jp": "だから読んだら必ず問いますの。**これは明日のどの実現・どの会議・どの報告・どの相談で使えるか。どの失敗を防げるか。** 血肉化は量ではなく、変換ですのよ。"
      }
]
  },
  {
    id:'lens-toc',
    tag:'Lens 3',
    title:'Think from the constraint.',
    desc:'Theory of Constraints, local optimisation, and Iwata’s practical examples: MOTHER 2 and Pokémon Gold and Silver.',
    items:[
      {
            "en": "Iwata’s habit of looking at the root, and of searching for one move that solves several problems at once, can be given a managerial skeleton through Eliyahu Goldratt’s Theory of Constraints. In this lens, intuition is not left as intuition. It becomes a repeatable way of thinking.",
            "jp": "岩田さんの「根っこを見る」「複数の問題を一度に解く一手」は、経営学ではゴールドラットの**制約理論（TOC）**として、すでに定式化されておりますの。直感に理論の骨を入れて、毎回まわせる形にしますわ。"
      },
      {
            "en": "The core idea is simple. The output of an entire system is decided by its weakest point: the constraint, or bottleneck. A chain is only as strong as its weakest link. Once you accept that, two rather cold but useful consequences follow.",
            "jp": "**核はひとつ**：システム全体の産出は、最も弱い一点（**制約＝ボトルネック**）で決まりますの。鎖の強さが最弱の輪で決まるのと同じですわ。ここから、冷たいほど明快な系が2つ落ちてきますのよ。",
            "quote": true
      },
      {
            "en": "First, improving anything other than the constraint does not move the whole system forward. It may make you busy. It may even make one local part look better. But it is still local optimisation. In that sense, it is the process version of the dog path: effort increases, but the real output barely changes.",
            "jp": "- **系1：制約以外をいくら改善しても、全体は1ミリも前に進まない。** 忙しくなるだけの改善——局所最適の幻影ですわ。お気づきかしら、これは「犬の道」の**プロセス版**ですの。イシュー度の低い問い＝非制約。あちらは問い選び、こちらは工程選び。同じ掛け算の論理が、思考と実行の両面で成立しておりますのよ。"
      },
      {
            "en": "Second, improvement must concentrate on one point at a time. The standard sequence is this: identify the constraint; exploit it fully; subordinate everything else to it; strengthen the constraint itself; and when the constraint moves, return to the first step. Just as importantly, do not keep old countermeasures alive out of habit after the constraint has moved.",
            "jp": "- **系2：だから改善はつねに一点集中。** TOCの5ステップ——**①制約を特定する → ②制約を徹底活用する → ③他のすべてを制約に従属させる → ④制約そのものを強化する → ⑤制約が移動したら①へ戻る**（そして、昔の制約への対策を惰性で続けないこと）。"
      },
      {
            "en": "The first Iwata example is MOTHER 2. When development was bogged down, he did not treat the constraint as a collection of individual bugs. He saw that the accumulated code itself had become the constraint. His famous practical choice was, in effect: if we merely patch it, it may take two years; if we rebuild it from scratch, it can be done in six months.",
            "jp": "**岩田さんの実例①（MOTHER2）**：開発が泥沼化した現場に入った岩田さんは、制約が個々のバグではなく**積み上がったコードそのもの**にあると見抜き、趣旨としてこう提示なさいましたの——「手直しなら2年、イチから作り直してよいなら半年」。症状（遅延）への対症療法ではなく、制約の特定と、複数の問題を一手で解く一撃。このOSの合言葉の、最も美しい実演ですわ。",
            "quote": true
      },
      {
            "en": "The second example is Pokémon Gold and Silver. Here the constraint was physical: cartridge capacity. Iwata, even from a management position, stepped directly into the compression problem. The freed capacity made it possible to include the whole Kanto region. The lesson is not about job titles. It is this: whoever can see the constraint must be willing to touch it. Your responsibility is decided not only by your title, but by where the bottleneck actually is.",
            "jp": "**岩田さんの実例②（ポケモン金銀）**：容量という物理制約に対し、経営側の立場ながら自ら圧縮の仕組みで踏み込み、空いた容量がカントー地方まるごとの収録につながりましたの。教訓は役職論ではなく——**制約が見える人が、制約に手を入れる。持ち場は肩書きでなく、制約が決める。**",
            "quote": true
      },
      {
            "en": "In practice, once a piece of work has begun, keep asking one question: what is the weakest link in this work right now? Is it missing information? Is it the quality of the output? Is it their decision? Is it external review or approval? Is it your own skill? Or is it your own hesitation?",
            "jp": "**現場への翻訳**：取り組みを始めたら、一点だけ問いますの。**「いま、この実現の最弱の輪はどれか」**——材料・情報の不足か／作り込みの質か／相手の意思決定か／外部の審査・承認か／自分の技量か／それとも、自分自身の迷いか。"
      },
      {
            "en": "If the constraint lies in someone’s undecided state, polishing the deliverable will not move the work forward. That would be local optimisation. The right move is not more refinement. It is to support the decision itself: give options, clarify decision criteria, and help the other person choose. This is why the sixteenth item in the thirty-second gate keeps this lens permanently active.",
            "jp": "制約が「誰かの迷い」にあるとき、成果物をいくら磨いても前へは進みませんわ（局所最適）。正しい一手は追加の作り込みではなく、選択肢と決定軸を渡して意思決定を支えること（⑬）ですのよ。30秒ゲートの16番は、この節の常駐化ですわ。"
      }
]
  },
  {
    id:'lens-hypothesis',
    tag:'Lens 4',
    title:'Where good hypotheses come from.',
    desc:'Miyamoto’s observation, Sakaguchi’s conviction, and one strict gate of verification for both.',
    items:[
      {
            "en": "This operating system is already strict about how hypotheses are tested. A hypothesis needs verification conditions, and it must be exposed to possible refutation. But another question remains: where do good hypotheses come from in the first place? In this lens, there are two sources, drawn from two creators who almost stand in opposition to each other. The important point is that they can coexist, as long as both pass through the same gate of verification.",
            "jp": "## 🎨 レンズ④：仮説はどこから来るか（宮本茂×坂口博信） {color=\"purple\"}\nこのOSは仮説の**検証**（⑥・⑨）には厳格ですわ。では、良い仮説はそもそもどこから来るのかしら。供給源は2系統、正反対の巨匠から仕入れてありますの。おふたりは思想としては相反しますけれど——**生成源としては併存できますのよ。同じ「検証」という関所を通る限り。**"
      },
      {
            "en": "The first source is observation, associated here with Shigeru Miyamoto. The principle is: do not only ask; watch. Miyamoto is famous for watching a first-time player from behind, without explaining, correcting, or helping. The reason is simple. People cannot always describe precisely where they are getting stuck. The mouth often reports the symptom, but behaviour reveals the cause.",
            "jp": "**観察起点（宮本茂）——訊くな、見よ**\n宮本さんの有名な流儀に「**肩越しの視線**」がありますの。初見の人が遊ぶ姿を、説明も助け舟もなしに、後ろから黙って見る。理由は明快で、**人は自分の躓きを正確には言語化できない**からですわ。口から出るのは症状まで、行動にだけ真因が現れる。",
            "quote": true
      },
      {
            "en": "This is structurally similar to field observation and ethnography in consulting. It also adds something important to the earlier idea of understanding, emotion, and practical stakes. You do not only ask what the other person knows, feels, or values. You also observe it. If someone says, it is fine, while reading the same document three times, the belly is probably not fine.",
            "jp": "これはコンサルの現場観察・エスノグラフィーと同型で、⑫への大切な追記になりますの——**頭・心・腹は「訊く」だけでなく「見る」で取る。** 相手が「大丈夫です」とおっしゃりながら同じ書類を三度読み返しているなら、腹は大丈夫ではありませんのよ。"
      },
      {
            "en": "The second source is conviction, associated here with Hironobu Sakaguchi. Some things cannot be observed, because they do not yet exist. Observation is powerful when you are improving something already present. But it cannot fully order a new world into being. Nobody could have commissioned Final Fantasy simply through user research alone.",
            "jp": "**確信起点（坂口博信）——観察できないものは、確信から跳ぶ**\n一方の坂口さんは、物語と感情を核に据える**確信からの跳躍**の人ですわ。ここで大事な論点はひとつ。観察は「いま存在するものの改善」には強いのに、**まだ存在しないものは観察できません**の。誰もFFを、ユーザー調査からは注文できませんでしたわ。",
            "quote": true
      },
      {
            "en": "In the language of reasoning, this is close to abductive inference: a leap towards a possible explanation or form, before it can be fully proved. The distance of that leap sometimes comes from outside observation: from conviction, aesthetic judgement, story, and a sense that something must exist. That is why conviction is allowed as a source of hypotheses.",
            "jp": "論理学でいう仮説的推論（**パースのアブダクション**）の飛距離は、観察の外——確信・美意識・物語——から来ることがある。これが確信起点の存在理由ですの。"
      },
      {
            "en": "The integration is this: generation may be free, but verification must be equally strict. Observation-based hypotheses and conviction-based hypotheses are born in different places. Yet once they enter this operating system, they face the same test: what should be observable if this is true, and what fact would force us to abandon it? In that sense, apparent opposition becomes division of labour.",
            "jp": "**統合——生成は自由に、検証は平等に厳格に**\nおふたりが相反するのは「どちらを最終審級にするか」というOS論の次元ですわ。でも本OSの最終審級はすでに決まっておりますの（⑥の検証条件と⑨の反証）。だから仮説の産地は問いませんのよ。**観察由来だろうと確信由来だろうと、同じ関所で同じ検査を受ける。** それだけで、相反は分業に変わりますわ。"
      },
      {
            "en": "There are two guardrails. The Miyamoto-side guardrail is the willingness to overturn the table. If the evidence kills the core of the hypothesis, you must be willing to discard even the work already built on top of it. Sunk cost is not a reason to keep a dead hypothesis alive.",
            "jp": "**ガードレール2本**\n1. **宮本側：ちゃぶ台返し。** 反証が仮説の核を殺したなら、積み上げた成果物ごと壊してやり直す勇気ですの。サンクコストは仮説の延命理由になりませんわ。",
            "quote": true
      },
      {
            "en": "The Bhagavad Gita’s instruction to release attachment to the fruits of action can be read here as a remedy for the same human habit. Only a person who can let go of attachment to what has already been built can truly overturn the table. This is refutation taken all the way into practice.",
            "jp": "『バガヴァッド・ギーター』が「**行為の成果への執着を離れよ**」と説いたのは、まさにこの心の癖への処方——**積み上げへの執着を手放せる人だけが、ちゃぶ台を返せます**のよ。⑨反証の、実装まで含めた最終形ですわ。"
      },
      {
            "en": "The Sakaguchi-side guardrail is that conviction must not be separated from verification. Conviction-driven work has high variance. When it works, it can create a new market or a new emotional form. When it fails, it can endanger the whole structure. So conviction is not exempt from testing. The moment it is exempt, it stops being a hypothesis and becomes a mere gamble.",
            "jp": "2. **坂口側：確信は検証と切り離さない。** 確信駆動は分散の大きい戦略——当たれば新しい市場、外れれば屋台骨が揺れますの。大きく当てる人は、大きく外しもする。だからこそ確信は⑥⑨の関所を免除されませんわ。免除した瞬間、それは仮説ではなくただの賭けになりますのよ。",
            "quote": true
      },
      {
            "en": "The practical translation is to generate hypotheses through two channels on purpose. First, ask what you would observe in the other person’s behaviour if a certain explanation were true. Second, ask what your own experience and conviction are telling you. Observation alone can trap you in incremental improvement. Conviction alone can become self-centred. Use both sources, and keep one gate: verification.",
            "jp": "**実践翻訳**：仮説出しは意図的に2チャンネルで。**(a) 相手の行動を観察したら、何が見えるはずか。(b) 自分の経験則と確信は、何と言っているか。** (a)だけだと改善屋止まり、(b)だけだと独りよがり。両方回して、関所は一つ、ですのよ。"
      }
]

      {

  {
    id:'phrases',
    tag:'Phrase templates',
    title:'Phrases you can actually say.',
    desc:'Acceptance, progress reports, bad news, consultation, proposal, documents, reports, and meetings — reshaped as spoken templates.',
    items:[
      {
            "en": "Ideas only become usable when they can be spoken. So this section is not merely a list of polite phrases. It is a small operating kit: language you can use when you accept a task, report progress, deliver bad news, ask for advice, make a proposal, write a document, give a report, or prepare a meeting.",

            "en": "When you accept a task, do not simply say, Yes, I will do it. Say something like this. Understood. I understand that the purpose this time is to support a decision about X. At the moment, I see A as the main issue. I will first check A, B, and C, and send an initial summary by the agreed time. Anything still unclear will be treated as a provisional assumption and marked as an item to confirm.",
            "jp": "受けた瞬間の最初の返し\n承知しました。今回の目的は「〇〇を判断するため」と理解しました。現時点ではAが主要論点だと見ています。まずA/B/Cを確認し、〇時までに一次整理します。不明点は仮置きで進め、確認事項として明記します。"
      },
      {
            "en": "For a progress report, give the other person a current location, not a diary of effort. A useful form is this. This is my initial update at this point. My provisional conclusion is that A is the most likely explanation. The grounds are, first, X; second, Y; and third, Z. However, B has not yet been confirmed. I will next check B and C, and update you by the agreed time.",
            "jp": "中間報告\n現時点の一次報告です。結論としてはAの可能性が高そうです。根拠は①〇〇②〇〇③〇〇。ただしBは未確認です。次にB・Cを確認し、〇時までに更新します。"
      },
      {
            "en": "Bad news should be sent early, even before the full picture is clear. The point is not to protect your evaluation. The point is to give the person you are supporting options as early as possible. A useful form is this. I am still checking the details, but a problem has occurred. The fact currently confirmed is A. The impact is not yet fixed. I will check B and C first, and send an initial report by the agreed time.",
            "jp": "悪い報せの速報（＝とにかく最速で出す）\nまだ詳細確認中ですが、問題が発生しています。現時点で分かっている事実はA。影響範囲は未確定です。まずB・Cを確認し、〇時までに一次報告します。"
      },
      {
            "en": "When you ask for advice, make the object of advice clear. Do not just say, What should I do? Say this. I am deciding between A and B. I see the decision criteria as speed, risk, and operational burden. At the moment, I lean towards A. However, B may be safer in the long term. What I would like you to check is whether the decision criteria are appropriate, and whether I am missing any risks in A.",
            "jp": "相談\nA/Bで迷っています。判断軸は①速さ②リスク③運用負荷と見ています。現時点ではA案寄り。ただしB案の方が長期の安全性は高いかもしれません。見ていただきたいのは、判断軸の妥当性と、A案の見落としリスクです。"
      },
      {
            "en": "A proposal should not stop at pointing out the problem. It should take responsibility for the next move. A useful form is this. At present, we have problem A, supported by evidence X and Y. There are three possible responses. Option A is fast but risky. Option B is robust but slower. Option C sits between the two. I recommend option B, because reproducibility matters more than speed here. As the next step, I will first confirm X.",
            "jp": "提案\n現状、Aという問題があります（根拠：①〇〇②〇〇）。打ち手は3つ。A案は速いがリスクあり／B案は堅いが時間がかかる／C案は中間。私は今回B案を推します。理由は、今回の制約では速さより再現性が効くから。次の一手として、まず〇〇を確認します。"
      },
      {
            "en": "A document is not a storage place for information. It is a tool for decision-making. Even a one-page document should make five things visible almost immediately: what the topic is, what you are claiming, what evidence supports it, what remains unconfirmed, and what the reader should do after reading it. The target is not a beautiful document. The target is a document that enables judgement.",
            "jp": "資料の型\n資料は情報の置き場ではなく、意思決定の道具ですわ。1枚なら、最低これを満たしますの。**何の話か／何を言いたいか／何を根拠にしているか／何が未確認か／読んだ後に何をすればいいか**が、それぞれ一瞬で分かること。きれいな資料より、判断できる資料。"
      },
      {
            "en": "A report should follow the order the listener needs, not the order in which you want to speak. In most cases, this order is enough: current location, conclusion or provisional hypothesis, facts supporting it, unconfirmed points and risks, and next actions. If these are in place, the other person can usually move.",
            "jp": "報告の型\n自分が話したい順ではなく、相手が聞きたい順で。**現在地 → 結論（or一次仮説） → 根拠となる事実 → 未確認とリスク → 次アクション。** たいていこれで足りますわ。"

      {
            "en": "A meeting is not a place for merely talking. It is a place for deciding. That is why, before the meeting, you should be able to draft about seventy per cent of the minutes: purpose, background, issues, expected agreements, tasks, and unresolved points. If you cannot draft the minutes before the meeting, that is an early warning. The purpose of the meeting may still be vague.",
            "jp": "会議の型\n会議は話す場ではなく、決める場。**会議前に、議事録を7割書いてしまう。** 目的・背景・論点・想定合意・ToDo・未決を先に置きますの。——**もし会議前に議事録が書けないなら、その会議は目的が曖昧な可能性が高い**、という優秀な早期警報にもなりますのよ。"

      {
            "en": "The common structure behind all these phrases is simple. Give the other person the purpose, your current judgement, the basis for that judgement, what is still uncertain, and the next action. Once that structure becomes speakable, the OS stops being theory and begins to operate in real time.",

            "quote": true
      }
]

  {
      "id": "gate",
      "tag": "Thirty-second gate",
      "title": "The sixteen checks before you start moving.",
      "desc": "A compact listening drill for checking the issue, hypothesis, risks, actions, agency, and constraint before you begin.",
      "items": [
          {
              "en": "Before you think deeply, pass through this gate. You do not need to answer every item perfectly. The item that catches you is not a failure. It is the next move.",

          },

              "en": "First, whose decision is this work meant to move forward, and what decision is it? If you cannot name the person and the decision, the work has not yet found its centre.",
              "jp": "1. この実現は、誰の・どの意思決定を進めるものか。"
          },
          {
              "en": "Second, what is the issue this time? In other words, what question, if answered, would actually change the next action?",
              "jp": "2. 今回のイシューは何か。"
          },
          {
              "en": "Third, what is the exit? Is the goal a decision, a narrowing of options, a risk scan, consensus-building, or simply a shared understanding of the current situation?",

          },
          {
              "en": "Fourth, what does your counterpart know, feel, and have at stake? What do they know, how are they feeling, and what responsibilities or interests are pressing on them?",
              "jp": "4. 相手の頭・心・腹はどうか。"
          },
          {
              "en": "Fifth, what is your hypothesis? Do not wait for a perfect answer. Place a provisional answer that can be tested.",
              "jp": "5. 自分の仮説は何か。"
          },
          {
              "en": "Sixth, if that hypothesis is true, what should you expect to observe? A hypothesis becomes useful when it creates expectations that can be checked.",
              "jp": "6. その仮説が正しいなら、何が観察されるはずか。"
          },
          {
              "en": "Seventh, what fact would make you abandon the hypothesis? This is the discipline that keeps conviction from becoming self-protection.",
              "jp": "7. 逆に、どんな事実が出たら仮説を捨てるか。"
          },
          {
              "en": "Eighth, are fact, evaluation, risk, and action separated? If they are mixed together, the discussion will usually stop at either, so what, or, what is the evidence?",
              "jp": "8. 事実・評価・リスク・アクションは分かれているか。"
          },
          {
              "en": "Ninth, do you have options and decision criteria? Options without criteria become a matter of taste. Criteria turn the conversation back into work.",
              "jp": "9. 選択肢と決定軸はあるか。"
          },
          {
              "en": "Tenth, is there one move that can solve several problems at once? Do not only treat symptoms one by one. Look for the root that connects them.",
              "jp": "10. 複数の問題を一度に解く一手はないか。"
          },
          {
              "en": "Eleventh, are you hiding bad news or unconfirmed points? If so, surface them early. Early uncertainty gives the other person more options.",
              "jp": "11. 悪い報せ・未確認を隠していないか。"
          },
          {
              "en": "Twelfth, have you designed a place to share progress before being asked? Trust grows when the other person does not have to wonder what is happening.",
              "jp": "12. 聞かれる前に共有する場を、設計しているか。"

          {
              "en": "Thirteenth, is the next action stated as who will do what, and by when? A next action that has no owner and no time is not yet an action.",

          {

          {

          {
              "en": "Sixteenth, is the part you are polishing really the weakest link in this work right now? If it is not the constraint, more polish may only create local optimisation.",

function enHtml(text){
  const matches = [];
  for(const phrase of highlightPhrases){
    const lower = text.toLowerCase();
    const needle = phrase.toLowerCase();
    let pos = lower.indexOf(needle);
    while(pos !== -1){
      matches.push({start:pos,end:pos+phrase.length});
      pos = lower.indexOf(needle, pos + Math.max(1, phrase.length));
    }
  }
  matches.sort((a,b)=>(a.start-b.start)||((b.end-b.start)-(a.end-a.start)));
  const chosen = [];
  for(const m of matches){
    if(chosen.length >= 3) break;
    if(chosen.every(c => m.end <= c.start || m.start >= c.end)) chosen.push(m);
  }
  if(!chosen.length){
    const firstStop = text.search(/[.!?](\s|$)/);
    const end = firstStop > 0 ? Math.min(firstStop + 1, 150) : Math.min(text.length, 120);
    chosen.push({start:0,end});
  }
  chosen.sort((a,b)=>a.start-b.start);
  let html = '';
  let cur = 0;
  for(const m of chosen){
    html += esc(text.slice(cur, m.start));
    html += '<strong>' + esc(text.slice(m.start, m.end)) + '</strong>';
    cur = m.end;
  }
  html += esc(text.slice(cur));
  return html;
}

const storageKey = 'consultIwataAudioState:v2';

function sectionPosition(index){
  const item = flat[index];
  if(!item) return {chapter:'', pos:0, total:0};
  const inChapter = flat.filter(x => x.sec === item.sec);
  const pos = inChapter.findIndex(x => x.idx === index) + 1;
  return {chapter:item.sec, pos, total:inChapter.length};
}

function savePlaybackState(extra={}){
  const state = {
    index: Math.max(0, currentIndex >= 0 ? currentIndex : savedIndex || 0),
    continuous,
    speechRate,
    jpMode,
    updatedAt: new Date().toISOString(),
    ...extra
  };
  try{ localStorage.setItem(storageKey, JSON.stringify(state)); }catch(e){}
  savedIndex = state.index;
  updateContinueButton();
}

function loadPlaybackState(){
  try{
    const raw = localStorage.getItem(storageKey);
    if(!raw) return;
    const state = JSON.parse(raw);
    if(Number.isFinite(state.index)) savedIndex = Math.max(0, Math.min(flat.length - 1, state.index));
    if(typeof state.continuous === 'boolean') continuous = state.continuous;
    if(Number.isFinite(state.speechRate) && speechRates.includes(state.speechRate)) speechRate = state.speechRate;
    if(typeof state.jpMode === 'string' && jpModes.includes(state.jpMode)) jpMode = state.jpMode;
  }catch(e){}
}

function updateContinueButton(){
  const idx = currentIndex >= 0 ? currentIndex : savedIndex;
  const item = flat[idx];
  if(!item){ continueBtn.textContent = 'Continue'; return; }
  const p = sectionPosition(idx);
  continueBtn.textContent = `Continue ${idx+1}/${flat.length}`;
  continueBtn.title = `${p.chapter} — ${p.pos}/${p.total}`;
}

function updateSpeedButton(){
  speedBtn.textContent = `Speed: ${speechRate.toFixed(1)}×`;
