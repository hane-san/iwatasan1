  const labels = {note:'Note', always:'Always', off:'Off'};
  hideJpBtn.textContent = `JP: ${labels[jpMode]}`;
  hideJpBtn.setAttribute('aria-label', `Japanese display mode: ${labels[jpMode]}`);
  if(jpMode !== 'note'){
    document.querySelectorAll('.para-card.show-jp').forEach(c=>c.classList.remove('show-jp','jp-flash'));
  }
}

function cycleJpMode(){
  const i = jpModes.indexOf(jpMode);
  jpMode = jpModes[(i + 1) % jpModes.length];
  applyJpMode();
  const messages = {
    note:'Japanese mode: show only the note you ask for.',
    always:'Japanese mode: always show a small original note under each card.',
    off:'Japanese mode: hidden for English-only listening.'
  };
  setStatus(messages[jpMode]);
  savePlaybackState();
}

function setStatus(message, index=currentIndex){
  const p = index >= 0 ? sectionPosition(index) : null;
  if(p && p.chapter){
    statusEl.innerHTML = `${esc(message)} <span aria-hidden="true">·</span> <strong>${esc(p.chapter)}</strong> ${p.pos}/${p.total} <span aria-hidden="true">·</span> ${index+1}/${flat.length}`;
  }else{
    statusEl.textContent = message;
  }
}

loadPlaybackState();
continuousBtn.classList.toggle('on', continuous);
continuousBtn.textContent = `Continuous: ${continuous ? 'ON' : 'OFF'}`;
continuousBtn.setAttribute('aria-pressed', String(continuous));
updateSpeedButton();
applyJpMode();
updateContinueButton();
setStatus(savedIndex > 0 ? 'Ready. Saved place is available.' : 'Ready.');

function loadVoices(){ voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if ('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }

function getBritishVoice(){
  if(!voices.length) loadVoices();
  return voices.find(v => /en-GB/i.test(v.lang) && /female|serena|susan|kate|victoria|samantha|google/i.test(v.name))
      || voices.find(v => /en-GB/i.test(v.lang))
      || voices.find(v => /^en/i.test(v.lang))
      || null;
}

function setPlaying(index){
  document.querySelectorAll('.para-card').forEach(c=>c.classList.remove('playing'));
  const card = document.querySelector(`.para-card[data-index="${index}"]`);
  if(card){card.classList.add('playing'); card.scrollIntoView({block:'center', behavior:'smooth'});}
  updateContinueButton();
}

function playbackPauseMs(index){
  const current = flat[index];
  const next = flat[index + 1];
  if(!current || !next) return 0;
  return current.sec === next.sec ? 1000 : 2000;
}

function showJapaneseNote(card){
  if(jpMode !== 'note') return false;
  document.querySelectorAll('.para-card.show-jp').forEach(c=>{ if(c !== card) c.classList.remove('show-jp'); });
  card.classList.add('show-jp','jp-flash');
  setTimeout(()=>card.classList.remove('jp-flash'), 260);
  return true;
}

function toggleJapaneseNoteForCard(card){
  if(!card) return false;
  if(jpMode !== 'note') return false;
  if(card.classList.contains('show-jp')){
    card.classList.remove('show-jp');
    return false;
  }
  return showJapaneseNote(card);
}

async function requestWakeLock(){
  if(!('wakeLock' in navigator) || wakeLock) return;
  try{ wakeLock = await navigator.wakeLock.request('screen'); }
  catch(e){ wakeLock = null; }
}

function releaseWakeLock(){
  if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; }
}

function updateMediaSession(item){
  if(!('mediaSession' in navigator) || !item) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: item.sec,
    artist: 'Consulting × Iwata Mindset',
    album: 'Completed Edition — Audio English'
  });
  try{
    navigator.mediaSession.setActionHandler('play', ()=>resumeSpeech());
    navigator.mediaSession.setActionHandler('pause', ()=>pauseSpeech());
    navigator.mediaSession.setActionHandler('previoustrack', ()=>jumpRelative(-1));
    navigator.mediaSession.setActionHandler('nexttrack', ()=>jumpRelative(1));
    navigator.mediaSession.playbackState = paused ? 'paused' : 'playing';
  }catch(e){}
}

function pauseSpeech(){
  if('speechSynthesis' in window && speechSynthesis.speaking && !speechSynthesis.paused){
    speechSynthesis.pause();
    paused = true;
    pauseBtn.textContent = 'Resume';
    setStatus('Paused.');
    savePlaybackState();
    if('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
  }
}

function resumeSpeech(){
  if('speechSynthesis' in window && speechSynthesis.paused){
    speechSynthesis.resume();
    paused = false;
    pauseBtn.textContent = 'Pause';
    setStatus(currentIndex >= 0 ? 'Reading.' : 'Ready.');
    savePlaybackState();
    if('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
  }
}

function jumpRelative(delta){
  const base = currentIndex >= 0 ? currentIndex : 0;
  const next = Math.max(0, Math.min(flat.length - 1, base + delta));
  speak(next);
}

function speak(index){
  if(!('speechSynthesis' in window)){
    setStatus('Speech synthesis is not available in this browser.');
    return;
  }
  stopped = false;
  currentIndex = index;
  const item = flat[index];
  if(!item) return;
  paused = false;
  pauseBtn.textContent = 'Pause';
  requestWakeLock();
  updateMediaSession(item);
  speechSynthesis.cancel();
  setPlaying(index);
  setStatus('Reading.', index);
  savePlaybackState({index});
  const utter = new SpeechSynthesisUtterance(item.en);
  utter.lang = 'en-GB';
  utter.rate = speechRate;
  utter.pitch = 0.98;
  utter.volume = 1;
  const v = getBritishVoice();
  if(v) utter.voice = v;
  utter.onend = () => {
    if(stopped) return;
    if(continuous && index < flat.length - 1){
      const pause = playbackPauseMs(index);
      const sameChapter = pause === 1000;
      setStatus(sameChapter ? 'Pausing briefly…' : 'Chapter break. Pausing for two seconds…', index);
      setTimeout(()=>{ if(!stopped) speak(index + 1); }, pause);
    }else{
      setStatus('Finished.', index);
      savePlaybackState({index});
      if('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
      releaseWakeLock();
      document.querySelectorAll('.para-card').forEach(c=>c.classList.remove('playing'));
    }
  };
  utter.onerror = () => { setStatus('The speech engine stopped. Try tapping again.'); savePlaybackState(); };
  speechSynthesis.speak(utter);
}


continueBtn.addEventListener('click',()=>{
  const idx = Math.max(0, Math.min(flat.length - 1, savedIndex || currentIndex || 0));
  speak(idx);
});

speedBtn.addEventListener('click',()=>{
  const i = speechRates.indexOf(speechRate);
  speechRate = speechRates[(i + 1) % speechRates.length];
  updateSpeedButton();
  savePlaybackState();
  if('speechSynthesis' in window && speechSynthesis.speaking && !speechSynthesis.paused && currentIndex >= 0){
    stopped = true;
    speechSynthesis.cancel();
    setTimeout(()=>{ stopped = false; speak(currentIndex); }, 80);
    setStatus(`Speed changed to ${speechRate.toFixed(1)} times. Restarting this paragraph.`);
  }else{
    setStatus(`Speed changed to ${speechRate.toFixed(1)} times.`);
  }
});

continuousBtn.addEventListener('click',()=>{
  continuous = !continuous;
  continuousBtn.classList.toggle('on', continuous);
  continuousBtn.textContent = `Continuous: ${continuous ? 'ON' : 'OFF'}`;
  continuousBtn.setAttribute('aria-pressed', String(continuous));
  setStatus(continuous ? 'Continuous playback is on. Same chapter: one second; chapter break: two seconds.' : 'Single paragraph playback is on.');
  savePlaybackState();
});
pauseBtn.addEventListener('click',()=>{
  if('speechSynthesis' in window && speechSynthesis.paused) resumeSpeech();
  else pauseSpeech();
});
prevBtn.addEventListener('click',()=>jumpRelative(-1));
nextBtn.addEventListener('click',()=>jumpRelative(1));
jpCurrentBtn.addEventListener('click',()=>{
  const card = document.querySelector(`.para-card[data-index="${currentIndex}"]`);
  if(!card){ setStatus('Start playback or tap a paragraph first.'); return; }
  if(jpMode === 'always'){
    setStatus('Japanese is already shown for every paragraph.');
    return;
  }
  if(jpMode === 'off'){
    setStatus('Japanese mode is off. Tap JP: Off to switch modes.');
    return;
  }
  const shown = toggleJapaneseNoteForCard(card);
  setStatus(shown ? 'Japanese note shown for the current paragraph.' : 'Japanese note hidden for the current paragraph.');
});
stopBtn.addEventListener('click',()=>{
  stopped = true;
  paused = false;
  pauseBtn.textContent = 'Pause';
  if('speechSynthesis' in window) speechSynthesis.cancel();
  if('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
  releaseWakeLock();
  document.querySelectorAll('.para-card').forEach(c=>c.classList.remove('playing'));
  setStatus('Stopped.');
  savePlaybackState();
});
hideJpBtn.addEventListener('click',cycleJpMode);

let startX = 0, startY = 0;
document.addEventListener('pointerdown', e=>{
  const card = e.target.closest('.para-card');
  if(!card) return;
  startX = e.clientX; startY = e.clientY;
});
document.addEventListener('pointerup', e=>{
  const card = e.target.closest('.para-card');
  if(!card) return;
  if(e.target.closest('.jp')){
    if(jpMode === 'note'){
      card.classList.remove('show-jp');
      setStatus('Japanese note hidden for this paragraph.');
    }
    return;
  }
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  if(Math.abs(dx) > 46 && Math.abs(dx) > Math.abs(dy)*1.2){
    if(jpMode !== 'note'){
      setStatus(jpMode === 'always' ? 'Japanese is already shown for every paragraph.' : 'Japanese mode is off. Tap JP: Off to switch modes.');
      return;
    }
    if(dx < 0){
      showJapaneseNote(card);
      setStatus('Japanese original shown as a bottom-right note.');
    }else{
      card.classList.remove('show-jp');
      setStatus('Japanese note hidden for this paragraph.');
    }
    return;
  }
  if(Math.abs(dx) < 12 && Math.abs(dy) < 12){
    speak(Number(card.dataset.index));
  }
});

document.addEventListener('visibilitychange',()=>{
  if(!document.hidden && !stopped) requestWakeLock();
});
</script>
</body>
</html>
